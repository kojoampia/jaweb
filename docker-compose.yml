version: '2'
services:
    jojoaddison:
        image: jojoaddison
        container_name: www.jojoaddison.io
        hostname: www.jojoaddison.io
        restart: always
        environment:
            - _JAVA_OPTIONS=-Xmx512m -Xms256m
            - 'SPRING_PROFILES_ACTIVE=prod,swagger'
            - 'SPRING_DATA_MONGODB_URI=mongodb://jojoaddison-mongodb:27017'
            - SPRING_DATA_MONGODB_DATABASE=jojoaddison
            - CONTENT_ROOT=/
            - CONTENT_DIRECTORY='content'
            - JHIPSTER_SLEEP=10
            - 'SPRING_DATA_JEST_URI=http://jojoaddison-elasticsearch:9200'
            - JHIPSTER_LOGGING_LOGSTASH_ENABLED=true
            - JHIPSTER_LOGGING_LOGSTASH_HOST=jhipster-logstash
            - JHIPSTER_METRICS_LOGS_ENABLED=true
            - JHIPSTER_METRICS_LOGS_REPORT_FREQUENCY=60
            - MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED=false
        ports:
            - '8080:8080'
        volumes:
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            - ./slides/:/app/resources/static/content/slide/
            - ./static/:/app/resources/static/static/
            - ./partners/:/app/resources/static/partner/
            - ./tinymce/:/app/resources/static/tinymce/
            - ./entrypoint.sh:/entrypoint.sh
    jojoaddison-mongodb:
        image: 'mongo:4.0.2'
        volumes:
            - './data/mongo:/data/db/'

    jhipster-elasticsearch:
        extends:
            file: jhipster-console.yml
            service: jhipster-elasticsearch
    jhipster-logstash:
        extends:
            file: jhipster-console.yml
            service: jhipster-logstash
        depends_on:
            - jhipster-elasticsearch
    jhipster-console:
        extends:
            file: jhipster-console.yml
            service: jhipster-console
        depends_on:
            - jhipster-elasticsearch
    jhipster-import-dashboards:
        extends:
            file: jhipster-console.yml
            service: jhipster-import-dashboards
        depends_on:
            - jhipster-elasticsearch
    jhipster-curator:
        extends:
            file: jhipster-console.yml
            service: jhipster-curator
        depends_on:
            - jhipster-elasticsearch
