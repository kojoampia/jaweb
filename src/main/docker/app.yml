version: '2'
services:
    jojoaddison-app:
        image: jojoaddison
        environment:
            - _JAVA_OPTIONS=-Xmx512m -Xms256m
            - SPRING_PROFILES_ACTIVE=prod,swagger
            - SPRING_DATA_MONGODB_URI=mongodb://jojoaddison-mongodb:27017
            - SPRING_DATA_MONGODB_DATABASE=jojoaddison
            - JHIPSTER_SLEEP=10 # gives time for the database to boot before the application
            - SPRING_DATA_JEST_URI=http://jojoaddison-elasticsearch:9200
        ports:
            - 8080:8080
    jojoaddison-mongodb:
        extends:
            file: mongodb.yml
            service: jojoaddison-mongodb
    jojoaddison-elasticsearch:
        extends:
            file: elasticsearch.yml
            service: jojoaddison-elasticsearch
