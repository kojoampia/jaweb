<div>
  <h2 id="page-heading" data-cy="AuthorityHeading">
    <span jhiTranslate="jojoaddisonApp.authority.home.title">Authorities</span>

    <div class="flex justify-end">
      <button mat-flat-button color="accent" class=" me-2" (click)="load()" [disabled]="isLoading">
        <jhi-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></jhi-icon>
        <span jhiTranslate="jojoaddisonApp.authority.home.refreshListLabel">Refresh list</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        mat-flat-button color="primary" class=" jh-create-entity create-authority"
        [routerLink]="['/authority/new']"
      >
        <jhi-icon icon="plus"></jhi-icon>
        <span jhiTranslate="jojoaddisonApp.authority.home.createLabel">Create a new Authority</span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  @if (authorities?.length === 0) {
    <div class="alert alert-warning" id="no-result">
      <span jhiTranslate="jojoaddisonApp.authority.home.notFound">No Authorities found</span>
    </div>
  }

  @if (authorities && authorities.length > 0) {
    <div class="table-responsive table-entities" id="entities">
      <table class="w-full border-collapse" aria-describedby="page-heading">
        <thead>
          <tr jhiSort [sortState]="sortState" (sortChange)="navigateToWithComponentValues($event)">
            <th scope="col" jhiSortBy="name">
              <div class="flex">
                <span jhiTranslate="jojoaddisonApp.authority.name">Name</span>

                <jhi-icon class="p-1" icon="sort"></jhi-icon>
              </div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          @for (authority of authorities; track trackName) {
            <tr data-cy="entityTable">
              <td>
                <a [routerLink]="['/authority', authority.name, 'view']">{{ authority.name }}</a>
              </td>
              <td class="text-end">
                <div class="btn-group">
                  <a [routerLink]="['/authority', authority.name, 'view']" mat-flat-button color="accent" class=" btn-sm" data-cy="entityDetailsButton">
                    <jhi-icon icon="eye"></jhi-icon>
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                  </a>

                  <button type="submit" (click)="delete(authority)" mat-flat-button color="warn" class=" btn-sm" data-cy="entityDeleteButton">
                    <jhi-icon icon="times"></jhi-icon>
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
