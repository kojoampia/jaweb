<div class="container-fluid ml-auto mr-auto mb-2">
    <div class="jumbotron headerbox bg-transparent">
        <h1 class="display-3">Services</h1>
    </div>
    <div class="card-group mt-3">
        <div *ngFor="let service of services" class="col-md-4 mt-1 mb-1">
            <div class="card widgetbox">
                <div class="card-header text-center">
                    <h4 class="display-6">
                        <a [routerLink]="['/service', 'view' , service.id]">
                            {{ service.name }}
                        </a>
                    </h4>
                </div>
                <div class="card-body text-left databox">
                    <div [innerHTML]="safeContent(service.description)"></div>
                </div>
                <img [src]="'data:' + service.photoContentType + ';base64,' + service.photo" style="max-width: 100%;"
                    alt="service image" class="card-bottom-img img-fluid" />
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="fixed-bottom bg-white">
    <jhi-footer></jhi-footer>
</div>
