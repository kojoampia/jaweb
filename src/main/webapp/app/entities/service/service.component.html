                    <fa-icon [icon]="'plus'"></fa-icon>
                    <span class="hidden-sm-down" >
                    Create new Service
                    </span>
                </button>
            </h2>
            <jhi-alert></jhi-alert>

        </div>
        <div class="card-body">
            <div>
                <div class="table-responsive" *ngIf="services">
                    <table class="table table-striped">
                        <thead class="text-white">
                        <tr jhiSort [(predicate)]="predicate" [(ascending)]="reverse" [callback]="transition.bind(this)">
                        <th jhiSortBy="name"><span>Name</span> <fa-icon [icon]="'sort'"></fa-icon></th>
                        <th jhiSortBy="photo"><span>Photo</span> <fa-icon [icon]="'sort'"></fa-icon></th>
                        <th jhiSortBy="contact"><span>Contact</span> <fa-icon [icon]="'sort'"></fa-icon></th>
                        <th jhiSortBy="modifiedDate"><span>Modified Date</span> <fa-icon [icon]="'sort'"></fa-icon></th>
                        <th jhiSortBy="modifiedBy"><span>Modified By</span> <fa-icon [icon]="'sort'"></fa-icon></th>
                        <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr *ngFor="let service of services ;trackBy: trackId" class="text-white">
                            <td><a class="text-white" [routerLink]="['/service', service.id, 'view' ]">{{service.name}}</a></td>
                            <td>
                                <a *ngIf="service.photo" (click)="openFile(service.photoContentType, service.photo)">
                                    <img [src]="'data:' + service.photoContentType + ';base64,' + service.photo" style="max-height: 30px;" alt="service image"/>
                                </a>
                            </td>
                            <td>{{service.contact}}</td>
                            <td>{{service.modifiedDate | date:'medium'}}</td>
                            <td>{{service.modifiedBy}}</td>
                            <td class="text-right">
                                <div class="btn-group flex-btn-group-container">
                                    <button type="submit"
                                            [routerLink]="['/service', service.id, 'view' ]"
                                            class="btn btn-info btn-sm">
                                        <fa-icon [icon]="'eye'"></fa-icon>
                                        <span class="d-none d-md-inline">View</span>
                                    </button>
                                    <button type="submit"
                                            [routerLink]="['/service', service.id, 'edit']"
                                            class="btn btn-primary btn-sm">
                                        <fa-icon [icon]="'pencil-alt'"></fa-icon>
                                        <span class="d-none d-md-inline">Edit</span>
                                    </button>
                                    <button type="submit"
                                            [routerLink]="['/', 'service', { outlets: { popup: service.id + '/delete'} }]"
                                            replaceUrl="true"
                                            queryParamsHandling="merge"
                                            class="btn btn-danger btn-sm">
                                        <fa-icon [icon]="'times'"></fa-icon>
                                        <span class="d-none d-md-inline">Delete</span>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="card-footer">
            <div *ngIf="services && services.length">
                <div class="row justify-content-center">
                    <jhi-item-count [page]="page" [total]="totalItems" [maxSize]="5" [itemsPerPage]="itemsPerPage"></jhi-item-count>
                </div>
                <div class="row justify-content-center">
                    <ngb-pagination [collectionSize]="totalItems" [(page)]="page" [pageSize]="itemsPerPage" [maxSize]="5" [rotate]="true" [boundaryLinks]="true" (pageChange)="loadPage(page)"></ngb-pagination>
                </div>
            </div>
        </div>
    </div>
</div>
