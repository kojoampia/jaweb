<form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
    <div class="container page-editor ml-auto mr-auto">
        <div class="card border-0 bg-transparent">
            <div class="card-header">
                <h2 id="jhi-service-heading">Service Management Editor</h2>
            </div>
            <div class="card-body">
                <div class="row justify-content-center">
                    <div class="col">
                        <div>
                            <jhi-alert-error></jhi-alert-error>
                            <div class="form-group">
                                <label class="form-control-label" for="field_name">Name</label>
                                <input type="text" class="form-control" name="name" id="field_name"
                                    [(ngModel)]="service.name" required />
                            </div>
                            <div class="form-group">
                                <label class="form-control-label" for="field_description">Description</label>
                                <jhi-editor [name]="'description'" [content]="service.description"
                                    (onDataChanged)="setContentChanged($event)"></jhi-editor>
                            </div>
                            <div class="form-group">
                                <label class="form-control-label" for="field_contact">Contact</label>
                                <input type="text" class="form-control" name="contact" id="field_contact"
                                    [(ngModel)]="service.contact" required/>
                            </div>
                            <div class="form-group">
                                <label class="form-control-label" for="field_photo">Photo</label>
                                <div>
                                    <img [src]="'data:' + service.photoContentType + ';base64,' + service.photo"
                                        style="max-height: 100px;" *ngIf="service.photo" alt="service image" />
                                    <div *ngIf="service.photo" class="form-text text-danger clearfix">
                                        <span class="pull-left">{{service.photoContentType}},
                                            {{byteSize(service.photo)}}</span>
                                        <button type="button"
                                            (click)="clearInputImage('photo', 'photoContentType', 'fileImage')"
                                            class="btn btn-secondary btn-xs pull-right">
                                            <fa-icon [icon]="'times'"></fa-icon>
                                        </button>
                                    </div>
                                    <input type="file" id="file_photo"
                                        (change)="setFileData($event, service, 'photo', true)" accept="image/*" />
                                </div>
                                <input type="hidden" class="form-control" name="photo" id="field_photo"
                                    [(ngModel)]="service.photo" />
                                <input type="hidden" class="form-control" name="photoContentType"
                                    id="field_photoContentType" [(ngModel)]="service.photoContentType" />
                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <div class="text-right">
                    <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
                        <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Cancel</span>
                    </button>
                    <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving"
                        class="btn btn-primary">
                        <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
