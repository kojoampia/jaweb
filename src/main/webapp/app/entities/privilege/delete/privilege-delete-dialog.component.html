@if (privilege) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(privilege.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="privilegeDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirm delete operation</h4>

      <span class="btn btn-close" data-dismiss="modal" aria-hidden="true" (click)="cancel()"></span>
    </div>

    <div class="modal-body">
      <jhi-alert-error></jhi-alert-error>
      <p id="jhi-delete-privilege-heading" jhiTranslate="jojoaddisonApp.privilege.delete.question" [translateValues]="{ id: privilege.id }">
        Are you sure you want to delete Privilege {{ privilege.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <jhi-icon icon="ban"></jhi-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
      </button>

      <button id="jhi-confirm-delete-privilege" data-cy="entityConfirmDeleteButton" type="submit" mat-flat-button color="warn" class="">
        <jhi-icon icon="times"></jhi-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
      </button>
    </div>
  </form>
}
