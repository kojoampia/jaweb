<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (privilege()) {
      <div>
        <h2 data-cy="privilegeDetailsHeading"><span jhiTranslate="jojoaddisonApp.privilege.detail.title">Privilege</span></h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ privilege()!.id }}</span>
          </dd>
          <dt><span jhiTranslate="jojoaddisonApp.privilege.name">Name</span></dt>
          <dd>
            <span>{{ privilege()!.name }}</span>
          </dd>
          <dt><span jhiTranslate="jojoaddisonApp.privilege.createdDate">Created Date</span></dt>
          <dd>
            <span>{{ privilege()!.createdDate | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="jojoaddisonApp.privilege.createdBy">Created By</span></dt>
          <dd>
            <span>{{ privilege()!.createdBy }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/privilege', privilege()!.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
