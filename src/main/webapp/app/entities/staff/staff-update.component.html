<div class="row justify-content-center">
    <div class="col-8">
        <form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
            <h2 id="jhi-staff-heading">Create or edit a Staff</h2>
            <div>
                <jhi-alert-error></jhi-alert-error>
                <div class="form-group" [hidden]="!staff.id">
                    <label for="id">ID</label>
                    <input type="text" class="form-control" id="id" name="id"
                        [(ngModel)]="staff.id" readonly />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_firstName">First Name</label>
                    <input type="text" class="form-control" name="firstName" id="field_firstName"
                        [(ngModel)]="staff.firstName" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_lastName">Last Name</label>
                    <input type="text" class="form-control" name="lastName" id="field_lastName"
                        [(ngModel)]="staff.lastName" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_dateOfBirth">Date Of Birth</label>
                    <div class="input-group">
                        <input id="field_dateOfBirth" type="text" class="form-control" name="dateOfBirth" ngbDatepicker  #dateOfBirthDp="ngbDatepicker" [(ngModel)]="staff.dateOfBirth"
                        />
                        <span class="input-group-append">
                            <button type="button" class="btn btn-secondary" (click)="dateOfBirthDp.toggle()"><fa-icon [icon]="'calendar-alt'"></fa-icon></button>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_email">Email</label>
                    <input type="text" class="form-control" name="email" id="field_email"
                        [(ngModel)]="staff.email" required pattern="^[a-zA-Z0-9]*$"/>
                    <div [hidden]="!(editForm.controls.email?.dirty && editForm.controls.email?.invalid)">
                        <small class="form-text text-danger"
                        [hidden]="!editForm.controls.email?.errors?.required">
                        This field is required.
                        </small>
                        <small class="form-text text-danger"
                            [hidden]="!editForm.controls.email?.errors?.pattern">
                            This field should follow pattern for "Email".
                        </small>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_digitalAddress">Digital Address</label>
                    <input type="text" class="form-control" name="digitalAddress" id="field_digitalAddress"
                        [(ngModel)]="staff.digitalAddress" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_streetAddress">Street Address</label>
                    <input type="text" class="form-control" name="streetAddress" id="field_streetAddress"
                        [(ngModel)]="staff.streetAddress" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_postalAddress">Postal Address</label>
                    <input type="text" class="form-control" name="postalAddress" id="field_postalAddress"
                        [(ngModel)]="staff.postalAddress" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_town">Town</label>
                    <input type="text" class="form-control" name="town" id="field_town"
                        [(ngModel)]="staff.town" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_district">District</label>
                    <input type="text" class="form-control" name="district" id="field_district"
                        [(ngModel)]="staff.district" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_city">City</label>
                    <input type="text" class="form-control" name="city" id="field_city"
                        [(ngModel)]="staff.city" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_region">Region</label>
                    <input type="text" class="form-control" name="region" id="field_region"
                        [(ngModel)]="staff.region" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_country">Country</label>
                    <input type="text" class="form-control" name="country" id="field_country"
                        [(ngModel)]="staff.country" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_digitalProfile">Digital Profile</label>
                    <div>
                        <img [src]="'data:' + staff.digitalProfileContentType + ';base64,' + staff.digitalProfile" style="max-height: 100px;" *ngIf="staff.digitalProfile" alt="staff image"/>
                        <div *ngIf="staff.digitalProfile" class="form-text text-danger clearfix">
                            <span class="pull-left">{{staff.digitalProfileContentType}}, {{byteSize(staff.digitalProfile)}}</span>
                            <button type="button" (click)="clearInputImage('digitalProfile', 'digitalProfileContentType', 'fileImage')" class="btn btn-secondary btn-xs pull-right">
                                <fa-icon [icon]="'times'"></fa-icon>
                            </button>
                        </div>
                        <input type="file" id="file_digitalProfile" (change)="setFileData($event, staff, 'digitalProfile', true)" accept="image/*"/>
                    </div>
                    <input type="hidden" class="form-control" name="digitalProfile" id="field_digitalProfile"
                        [(ngModel)]="staff.digitalProfile" />
                    <input type="hidden" class="form-control" name="digitalProfileContentType" id="field_digitalProfileContentType"
                        [(ngModel)]="staff.digitalProfileContentType" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_accountNumber">Account Number</label>
                    <input type="text" class="form-control" name="accountNumber" id="field_accountNumber"
                        [(ngModel)]="staff.accountNumber" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_accountType">Account Type</label>
                    <input type="text" class="form-control" name="accountType" id="field_accountType"
                        [(ngModel)]="staff.accountType" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_documents">Documents</label>
                    <div>
                        <div *ngIf="staff.documents" class="form-text text-danger clearfix">
                            <a class="pull-left" (click)="openFile(staff.documentsContentType, staff.documents)">open</a><br>
                            <span class="pull-left">{{staff.documentsContentType}}, {{byteSize(staff.documents)}}</span>
                            <button type="button" (click)="staff.documents=null;staff.documentsContentType=null;"
                                    class="btn btn-secondary btn-xs pull-right">
                                <fa-icon [icon]="'times'"></fa-icon>
                            </button>
                        </div>
                        <input type="file" id="file_documents" (change)="setFileData($event, staff, 'documents', false)"/>
                    </div>
                    <input type="hidden" class="form-control" name="documents" id="field_documents"
                        [(ngModel)]="staff.documents" />
                    <input type="hidden" class="form-control" name="documentsContentType" id="field_documentsContentType"
                        [(ngModel)]="staff.documentsContentType" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_createdDate">Created Date</label>
                    <div class="d-flex">
                        <input id="field_createdDate" type="datetime-local" class="form-control" name="createdDate" [(ngModel)]="createdDate" placeholder="YYYY-MM-DD HH:mm"
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_modifiedDate">Modified Date</label>
                    <div class="d-flex">
                        <input id="field_modifiedDate" type="datetime-local" class="form-control" name="modifiedDate" [(ngModel)]="modifiedDate" placeholder="YYYY-MM-DD HH:mm"
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_lastModifiedBy">Last Modified By</label>
                    <input type="text" class="form-control" name="lastModifiedBy" id="field_lastModifiedBy"
                        [(ngModel)]="staff.lastModifiedBy" />
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="field_documentType">Document Type</label>
                    <select class="form-control" name="documentType" [(ngModel)]="staff.documentType" id="field_documentType"  required>
                        <option value="NATIONAL_ID">NATIONAL_ID</option>
                        <option value="PASSPORT">PASSPORT</option>
                        <option value="DRIVING_LICENSE">DRIVING_LICENSE</option>
                        <option value="VOTER_ID">VOTER_ID</option>
                    </select>
                    <div [hidden]="!(editForm.controls.documentType?.dirty && editForm.controls.documentType?.invalid)">
                        <small class="form-text text-danger"
                        [hidden]="!editForm.controls.documentType?.errors?.required">
                        This field is required.
                        </small>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-control-label" for="field_credential">Credential</label>
                    <select class="form-control" id="field_credential" name="credential" [(ngModel)]="staff.credential" >
                        <option [ngValue]="null"></option>
                        <option [ngValue]="userOption.id === staff.credential?.id ? staff.credential : userOption" *ngFor="let userOption of users; trackBy: trackUserById">{{userOption.login}}</option>
                    </select>
                </div>
            </div>
            <div>
                <button type="button" id="cancel-save" class="btn btn-secondary"  (click)="previousState()">
                    <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Cancel</span>
                </button>
                <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving" class="btn btn-primary">
                    <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                </button>
            </div>
        </form>
    </div>
</div>
