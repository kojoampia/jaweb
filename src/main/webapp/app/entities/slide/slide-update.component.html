<div *ngIf="slide">
    <div class="container mt-1 mb-5">
        <div class="card border-0 p-3">
            <div class="card-body">
                <form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
                    <h2 id="jhi-slide-heading">Create or edit a Slide</h2>
                    <div>
                        <jhi-alert-error></jhi-alert-error>
                        <div class="form-group" [hidden]="true">
                            <label for="id">ID</label>
                            <input type="text" class="form-control" id="id" name="id" [(ngModel)]="slide.id" readonly />
                        </div>
                        <div class="form-group">
                            <label class="form-control-label" for="field_title">Title</label>
                            <input type="text" class="form-control" name="title" id="field_title" [(ngModel)]="slide.title" />
                        </div>
                        <div class="form-group">
                            <label class="form-control-label" for="field_description">Description</label>
                            <input
                                type="text"
                                class="form-control"
                                name="description"
                                id="field_description"
                                [(ngModel)]="slide.description"
                            />
                        </div>
                        <div class="form-group">
                            <label class="form-control-label" for="field_photo">Photo</label>
                            <div>
                                <img
                                    [src]="'data:' + slide.photoContentType + ';base64,' + slide.photo"
                                    height="200px" width="auto"
                                    *ngIf="slide.photo"
                                    alt="slide image"
                                />
                                <div *ngIf="slide.photo" class="form-text text-danger clearfix">
                                    <span class="pull-left">{{ slide.photoContentType }}, {{ byteSize(slide.photo) }}</span>
                                    <button
                                        type="button"
                                        (click)="clearInputImage('photo', 'photoContentType', 'fileImage')"
                                        class="btn btn-secondary btn-xs pull-right"
                                    >
                                        <fa-icon [icon]="'times'"></fa-icon>
                                    </button>
                                </div>
                                <input type="file" id="file_photo" (change)="setFileData($event, slide, 'photo', true)" accept="image/*" />

                                <div *ngIf="slide.url" class="form-text text-danger clearfix">
                                    <button
                                        type="button"
                                        (click)="clearImage()"
                                        class="btn btn-secondary btn-xs pull-right"
                                    >
                                        <fa-icon [icon]="'times'"></fa-icon>
                                    </button>
                                    <img [src]="slide.url" alt="" height="200px" width="auto" />
                                </div>
                            </div>
                            <input type="hidden" class="form-control" name="photo" id="field_photo" [(ngModel)]="slide.photo" />
                            <input
                                type="hidden"
                                class="form-control"
                                name="photoContentType"
                                id="field_photoContentType"
                                [(ngModel)]="slide.photoContentType"
                            />
                        </div>
                    </div>
                    <div>
                        <button type="button" id="cancel-save" class="btn btn-secondary" (click)="close()">
                            <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Close</span>
                        </button>
                        <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving" class="btn btn-primary">
                            <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
