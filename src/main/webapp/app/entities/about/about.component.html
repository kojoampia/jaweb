<div class="page-editor container mr-auto ml-auto">
    <div class="card border-0 bg-transparent">
        <div class="card-header" *ngIf="!abouts || abouts.length == 0">
            <h2 id="page-heading">
                <span>About Us</span>
                <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-about"
                    [routerLink]="['/about/new']">
                    <fa-icon [icon]="'plus'"></fa-icon>
                    <span class="hidden-sm-down">
                        Create new About
                    </span>
                </button>
            </h2>
            <jhi-alert></jhi-alert>
        </div>
        <div class="card-body" *ngIf="abouts && abouts.length > 0">
            <jhi-about-detail [about]="abouts[0]" [embed]="true"></jhi-about-detail>
        </div>
    </div>
</div>
