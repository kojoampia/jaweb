<div class="container ml-auto mr-auto mb-5 mt-2">
    <div class="card blogbox bg-transparent text-primary" *ngIf="!!about">
    <div class="card-header text-center">
        <h1 class="display-4">About us</h1>
        <span>{{ about.modifiedDate | date: 'medium'}}</span>
    </div>
        <div class="card-body databox">
            <div [innerHTML]="sanitize(about.content)">
            </div>
        </div>
    </div>
</div>
