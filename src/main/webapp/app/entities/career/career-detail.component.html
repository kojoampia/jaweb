<div class="row justify-content-center">
    <div class="col-8">
        <div *ngIf="career">
            <h2><span>Career</span> {{career.id}}</h2>
            <hr>
            <jhi-alert-error></jhi-alert-error>
            <dl class="row-md jh-entity-details">
                <dt><span>Name</span></dt>
                <dd>
                    <span>{{career.name}}</span>
                </dd>
                <dt><span>Description</span></dt>
                <dd>
                    <span>{{career.description}}</span>
                </dd>
                <dt><span>Department</span></dt>
                <dd>
                    <span>{{career.department}}</span>
                </dd>
                <dt><span>Created Date</span></dt>
                <dd>
                    <span>{{career.createdDate}}</span>
                </dd>
                <dt><span>Modified Date</span></dt>
                <dd>
                    <span>{{career.modifiedDate}}</span>
                </dd>
                <dt><span>Last Modified By</span></dt>
                <dd>
                    <span>{{career.lastModifiedBy}}</span>
                </dd>
            </dl>

            <button type="submit"
                    (click)="previousState()"
                    class="btn btn-info">
                <fa-icon [icon]="'arrow-left'"></fa-icon>&nbsp;<span> Back</span>
            </button>

            <button type="button"
                    [routerLink]="['/career', career.id, 'edit']"
                    class="btn btn-primary">
                <fa-icon [icon]="'pencil-alt'"></fa-icon>&nbsp;<span> Edit</span>
            </button>
        </div>
    </div>
</div>
