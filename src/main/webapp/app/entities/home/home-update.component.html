<div class="container mt-2">
    <div class="card border-0 pad">
        <div class="card-body  mt-3 mb-3">
            <form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
                <h2 id="jhi-home-heading">Create or edit a Home</h2>
                <div>
                    <jhi-alert-error></jhi-alert-error>
                    <div class="form-group" [hidden]="!home.id">
                        <label for="id">ID</label>
                        <input type="text" class="form-control" id="id" name="id" [(ngModel)]="home.id" readonly />
                    </div>
                    <div class="form-group">
                        <label class="form-control-label" for="field_header">Header</label>
                        <input type="text" class="form-control" name="header" id="field_header" [(ngModel)]="home.header" />
                    </div>
                    <div class="form-group">
                        <label class="form-control-label" for="field_information">Information</label>
                        <input type="text" class="form-control" name="information" id="field_information" [(ngModel)]="home.information" />
                    </div>
                </div>
                <div>
                    <button type="button" id="close-save" class="btn btn-secondary" (click)="close()">
                        <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Close</span>
                    </button>
                    <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving" class="btn btn-primary">
                        <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
