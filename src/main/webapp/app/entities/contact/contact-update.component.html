<form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
    <div class="page-editor container ml-auto mr-auto">
        <div class="card border-0 bg-transparent">
            <div class="card-header">
                <h2 class="display-4" id="myContactLabel">Contact Management Editor</h2>
            </div>
            <div class="card-body">
                <jhi-alert-error></jhi-alert-error>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_title">Title</label>
                    <input type="text" class="form-control" name="title" id="field_title" [(ngModel)]="contact.title" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_appointment">Appointment</label>
                    <input type="text" class="form-control" name="appointment" id="field_appointment"
                        [(ngModel)]="contact.appointment" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_address">Address</label>
                    <input type="text" class="form-control" name="address" id="field_address"
                        [(ngModel)]="contact.address" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_street">Street</label>
                    <input type="text" class="form-control" name="street" id="field_street"
                        [(ngModel)]="contact.street" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_code">Code</label>
                    <input type="text" class="form-control" name="code" id="field_code" [(ngModel)]="contact.code" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_city">City</label>
                    <input type="text" class="form-control" name="city" id="field_city" [(ngModel)]="contact.city" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_state">State</label>
                    <input type="text" class="form-control" name="state" id="field_state" [(ngModel)]="contact.state" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_region">Region</label>
                    <input type="text" class="form-control" name="region" id="field_region"
                        [(ngModel)]="contact.region" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_country">Country</label>
                    <input type="text" class="form-control" name="country" id="field_country"
                        [(ngModel)]="contact.country" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_telephone">Telephone</label>
                    <input type="text" class="form-control" name="telephone" id="field_telephone"
                        [(ngModel)]="contact.telephone" required />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_email">Email</label>
                    <input type="text" class="form-control" name="email" id="field_email" [(ngModel)]="contact.email" required />
                    <div [hidden]="!(editForm.controls.email?.dirty && editForm.controls.email?.invalid)">
                        <small class="form-text text-danger" [hidden]="!editForm.controls.email?.errors?.required">
                            This field is required.
                        </small>
                        <small class="form-text text-danger" [hidden]="!editForm.controls.email?.errors?.pattern">
                            This field should follow pattern for "Email".
                        </small>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_whatsapp">Whatsapp</label>
                    <input type="text" class="form-control" name="whatsapp" id="field_whatsapp"
                        [(ngModel)]="contact.whatsapp" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_facebook">Facebook</label>
                    <input type="text" class="form-control" name="facebook" id="field_facebook"
                        [(ngModel)]="contact.facebook" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_twitter">Twitter</label>
                    <input type="text" class="form-control" name="twitter" id="field_twitter"
                        [(ngModel)]="contact.twitter" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_google">Google</label>
                    <input type="text" class="form-control" name="google" id="field_google"
                        [(ngModel)]="contact.google" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_youtube">Youtube</label>
                    <input type="text" class="form-control" name="youtube" id="field_youtube"
                        [(ngModel)]="contact.youtube" />
                </div>
                <div class="form-group">
                    <label class="form-control-label"
                        for="field_location">Location</label>
                    <div class="form-inline">
                        <input type="text" class="form-control" name="longitude" id="field_longitude"
                            [(ngModel)]="contact.longitude" placeholder="longitude" />
                        <input type="text" class="form-control" name="latitude" id="field_latitude"
                            [(ngModel)]="contact.latitude" placeholder="latitude" />
                        <input class="form-inline" type="file" id="file_image"
                            (change)="setFileData($event, contact, 'image', true)" accept="image/*"
                            jhiTranslate="entity.action.addimage" />
                        <input type="hidden" class="form-control" name="image" id="field_image"
                            [(ngModel)]="contact.image" />
                        <input type="hidden" class="form-control" name="imageContentType" id="field_imageContentType"
                            [(ngModel)]="contact.imageContentType" />
                    </div>
                    <div class="mt-2">
                        <img [src]="'data:' + contact.imageContentType + ';base64,' + contact.image"
                            style="max-height: 100px;" *ngIf="contact.image" alt="contact image" />
                        <div *ngIf="contact.image" class="form-text text-danger clearfix">
                            <span class="pull-left">{{contact.imageContentType}}, {{byteSize(contact.image)}}</span>
                            <button type="button" (click)="clearInputImage('image', 'imageContentType', 'fileImage')"
                                class="btn btn-secondary btn-xs pull-right">
                                <span class="fa fa-times"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer text-right">
                <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
                    <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Cancel</span>
                </button>
                <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving"
                    class="btn btn-primary">
                    <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                </button>
            </div>
        </div>
    </div>
</form>
