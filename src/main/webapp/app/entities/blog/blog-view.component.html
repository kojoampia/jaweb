<div class="row-fluid mt-2">
    <div class="col-2">

    </div>

    <div class="col" #blogHeader>
        <div class="container page-editor" *ngIf="blog">
            <div class="card border-0 bg-transparent">
                <div class="card-header text-white text-center">
                    <h1>{{blog.title}}</h1>
                    <span class="text-right">{{blog.modifiedDate | date: 'medium'}}</span>
                </div>
                <div class="card-body bg-white text-black">
                    <div [innerHTML]="safeContent(blog.content)"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="col">

    </div>

</div>
<div class="row-fluid fixed-bottom">
    <div class="col text-right">
        <div class="scroller">
            <button (click)="onScrollUp(blogHeader)">
                <fa-icon [icon]="'plus'"></fa-icon>
            </button>
        </div>
    </div>
</div>
