<form name="editForm" role="form" novalidate (ngSubmit)="save()" #editForm="ngForm">
    <div class="container page-editor ml-auto mr-auto">
        <div class="card border-0 bg-transparent">
            <div class="card-header text-center">
                <h2 id="jhi-blog-heading">Blog Editor</h2>
            </div>
            <div class="card-body bg-white text-black">
                <div class="row justify-content-center">
                    <div class="col">
                        <div>
                            <jhi-alert-error></jhi-alert-error>
                            <div class="form-group">
                                <label class="form-control-label" for="field_title">Title</label>
                                <input type="text" class="form-control" name="title" id="field_title"
                                    [(ngModel)]="blog.title" />
                            </div>
                            <div class="form-group">
                                <label class="form-control-label" for="field_content">Content</label>
                                <jhi-editor [name]="'content'" [content]="blog.content"
                                    (onDataChanged)="setContentChanged($event)"></jhi-editor>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-secondary">
                <div class="text-right">
                    <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
                        <fa-icon [icon]="'ban'"></fa-icon>&nbsp;<span>Cancel</span>
                    </button>
                    <button type="submit" id="save-entity" [disabled]="editForm.form.invalid || isSaving"
                        class="btn btn-primary">
                        <fa-icon [icon]="'save'"></fa-icon>&nbsp;<span>Save</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
