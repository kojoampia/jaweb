<div class="container ml-auto mr-auto" *ngIf="blog">
    <div class="card border-0 blogbox">
        <div class="card-header text-center">
            <h1>{{ blog.title }}</h1>
        </div>
        <div class="card-body bg-white text-black databox">
            <div [innerHTML]="content"></div>
            <hr>
            <div class="row justify-content-center mt-2">
                <div class="col">
                    <div>
                        <dl class="row-md jh-entity-details">
                            <dt><span>Created Date</span></dt>
                            <dd>
                                <span>{{blog.createdDate}}</span>
                            </dd>
                            <dt><span>Modified Date</span></dt>
                            <dd>
                                <span>{{blog.modifiedDate}}</span>
                            </dd>
                            <dt><span>Last Modified By</span></dt>
                            <dd>
                                <span>{{blog.lastModifiedBy}}</span>
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
        <div *jhiHasAnyAuthority="'ROLE_USER'" class="card-footer bg-white text-right">
            <button type="submit" (click)="previousState()" class="btn btn-info">
                <fa-icon [icon]="'arrow-left'"></fa-icon>&nbsp;<span> Back</span>
            </button>

            <button type="button" [routerLink]="['/blog', blog.id, 'edit']" class="btn btn-primary">
                <fa-icon [icon]="'pencil-alt'"></fa-icon>&nbsp;<span> Edit</span>
            </button>
        </div>
    </div>
</div>
