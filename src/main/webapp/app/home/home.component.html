<div class="home">
    <div class="container-fluid mt-1 mb-1 head-info bg-transparent">
        <div class="container">
            <jhi-infobox [info]="info"></jhi-infobox>
        </div>
    </div>
    <div class="container-fluid mt-0 slidebox bg-white">
        <div class="container">
            <!-- Sliderbox-->
            <jhi-slider slides="home.slides"></jhi-slider>
        </div>
    </div>

    <div class="container mt-3" id="home-table-container">
        <div id="home-table-inner-container">
            <jhi-footer></jhi-footer>
        </div>
    </div>
</div>
