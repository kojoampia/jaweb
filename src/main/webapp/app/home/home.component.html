<div class="home" *ngIf="loaded">
    <div class="row justify-content-center mt-1 mb-1 head-info bg-transparent">
        <div class="container text-center ml-auto mr-auto ">
            <!--Information Box -->
            <jhi-infobox [info]="info"></jhi-infobox>
            <!-- Sliderbox -->
            <jhi-slider [width]="1200" [height]="620" [slides]="slides"></jhi-slider>
            <!-- Portfolio -->
            <jhi-portfolio-viewer [portfolios]="portfolios">
            </jhi-portfolio-viewer>
            <!-- Services -->
            <jhi-service-viewer [services]="services">
            </jhi-service-viewer>
            <!-- Partner -->
            <jhi-partner-viewer [partners]="partners">
            </jhi-partner-viewer>
            <!-- Footer -->
            <jhi-footer></jhi-footer>
        </div>
    </div>
</div>
